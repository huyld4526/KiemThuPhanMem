server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: irrigation-system
    static_configs:
      - targets:
          - localhost
        labels:
          job: irrigation-system
          # Promtail supports environment variable expansion if run with -config.expand-env=true
          app: ${APP_NAME:-irrigation-system}
          env: ${APP_ENV:-local}
          __path__: /app/logs/app*.log
    
    # Optional pipeline to extract fields from JSON and create Loki labels dynamically
    # pipeline_stages:
